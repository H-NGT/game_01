<!doctype html>
<html lang="ja" class="is-game-document">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Number Gate Runner</title>
    <link rel="stylesheet" href="./src/visual/styles.css?v=difficulty-ui-1" />
    <script type="importmap">
      {
        "imports": {
          "three": "./src/vendor/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <!-- CODEX_START: VISUAL_AND_UI -->
    <main class="game-shell" aria-label="Number Gate Runner">
      <div id="gameCanvas" class="scene-host" aria-hidden="true"></div>

      <section class="hud" aria-label="ゲーム情報">
        <div class="hud__cluster">
          <p class="hud__label">POWER</p>
          <p id="playerPower" class="hud__value">1</p>
        </div>
        <div class="hud__cluster hud__cluster--center">
          <p class="hud__label">SCORE</p>
          <p id="scoreValue" class="hud__value">0</p>
        </div>
        <div class="hud__cluster">
          <p class="hud__label">WAVE</p>
          <p id="waveValue" class="hud__value">1</p>
        </div>
      </section>

      <button id="pauseButton" class="pause-button" type="button" aria-label="一時停止">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>

      <section id="startOverlay" class="overlay overlay--active" aria-live="polite">
        <div class="overlay__panel">
          <p class="overlay__kicker">3D RUNNER</p>
          <h1>Number Gate</h1>
          <p class="overlay__copy">左右のゲートで弾数を増やし、正面の敵を削り切るランナーゲーム。</p>
          <div class="difficulty-control" aria-label="難易度">
            <p class="difficulty-control__label">DIFFICULTY</p>
            <div class="difficulty-control__buttons">
              <button class="difficulty-button" type="button" data-difficulty="1">1</button>
              <button class="difficulty-button" type="button" data-difficulty="2">2</button>
              <button class="difficulty-button" type="button" data-difficulty="3">3</button>
              <button class="difficulty-button" type="button" data-difficulty="4">4</button>
              <button class="difficulty-button" type="button" data-difficulty="5">5</button>
            </div>
          </div>
          <button id="startButton" class="primary-button" type="button">START</button>
        </div>
      </section>

      <section id="gameOverOverlay" class="overlay" aria-live="polite">
        <div class="overlay__panel">
          <p class="overlay__kicker">RESULT</p>
          <h2>Game Over</h2>
          <p id="finalScore" class="overlay__score">Score 0</p>
          <button id="restartButton" class="primary-button primary-button--retry" type="button">
            RETRY
          </button>
        </div>
      </section>

      <section id="clearOverlay" class="overlay" aria-live="polite">
        <div class="overlay__panel overlay__panel--clear">
          <p class="overlay__kicker">STAGE CLEAR</p>
          <h2>Clear!</h2>
          <p id="clearScore" class="overlay__score">Score 0</p>
          <button id="clearRestartButton" class="primary-button primary-button--retry" type="button">
            PLAY AGAIN
          </button>
        </div>
      </section>

      <section id="pauseOverlay" class="overlay overlay--pause" aria-live="polite">
        <div class="overlay__panel overlay__panel--pause">
          <p class="overlay__kicker">PAUSED</p>
          <h2>PAUSE</h2>
          <p class="overlay__copy">ゲームを一時停止中</p>
          <div class="difficulty-control" aria-label="難易度">
            <p class="difficulty-control__label">DIFFICULTY</p>
            <div class="difficulty-control__buttons">
              <button class="difficulty-button" type="button" data-difficulty="1">1</button>
              <button class="difficulty-button" type="button" data-difficulty="2">2</button>
              <button class="difficulty-button" type="button" data-difficulty="3">3</button>
              <button class="difficulty-button" type="button" data-difficulty="4">4</button>
              <button class="difficulty-button" type="button" data-difficulty="5">5</button>
            </div>
          </div>
          <button id="resumeButton" class="primary-button primary-button--retry" type="button">
            RESUME
          </button>
          <button id="pauseRestartButton" class="secondary-button" type="button">
            RESTART FROM START
          </button>
        </div>
      </section>
    </main>
    <!-- CODEX_END: VISUAL_AND_UI -->

    <script type="module">
      // コアロジック層を読み込む。副作用 import により window.gameState /
      // window.GameAPI を生成し、visual:start-requested / restart-requested を
      // 購読、入力接続とロジックループを開始する。VisualController より先に
      // 評価され、描画開始時点で window.gameState の存在を保証する。
      import './src/core/index.js';
      import { VisualController } from './src/visual/visual.js?v=difficulty-ui-1';

      const visual = new VisualController({
        mount: document.querySelector('#gameCanvas'),
        hud: {
          power: document.querySelector('#playerPower'),
          score: document.querySelector('#scoreValue'),
          wave: document.querySelector('#waveValue'),
          startOverlay: document.querySelector('#startOverlay'),
          gameOverOverlay: document.querySelector('#gameOverOverlay'),
          clearOverlay: document.querySelector('#clearOverlay'),
          pauseOverlay: document.querySelector('#pauseOverlay'),
          pauseButton: document.querySelector('#pauseButton'),
          finalScore: document.querySelector('#finalScore'),
          clearScore: document.querySelector('#clearScore')
        }
      });

      visual.start();
      installTouchLock(document.querySelector('.game-shell'));

      const previewMode = new URLSearchParams(window.location.search).get('preview');
      if (previewMode === 'play') {
        visual.requestPreviewStatus('playing');
      } else if (previewMode === 'gameover' || previewMode === 'clear' || previewMode === 'paused') {
        visual.requestPreviewStatus(previewMode);
      }

      installDifficultyControls();

      const emitGameRequest = (type) => {
        window.dispatchEvent(new CustomEvent(type));
        if (typeof window.startGame === 'function') window.startGame();
      };

      document.querySelector('#startButton').addEventListener('click', () => {
        visual.requestPreviewStart();
        emitGameRequest('visual:start-requested');
      });

      document.querySelector('#restartButton').addEventListener('click', () => {
        visual.requestPreviewRestart();
        emitGameRequest('visual:restart-requested');
      });

      document.querySelector('#clearRestartButton').addEventListener('click', () => {
        visual.requestPreviewRestart();
        emitGameRequest('visual:restart-requested');
      });

      const requestPauseToggle = (event) => {
        event.preventDefault();
        event.stopPropagation();
        if (typeof window.togglePause === 'function') {
          window.togglePause();
          return;
        }
        if (window.gameState?.status === 'paused') {
          window.GameAPI?.resume?.();
        } else {
          window.GameAPI?.pause?.();
        }
      };

      document.querySelector('#pauseButton').addEventListener('click', requestPauseToggle);
      document.querySelector('#resumeButton').addEventListener('click', requestPauseToggle);
      document.querySelector('#pauseRestartButton').addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        visual.requestPreviewRestart();
        emitGameRequest('visual:restart-requested');
      });
      blockOverlayTouch(document.querySelector('#pauseOverlay'));

      function installDifficultyControls() {
        const buttons = [...document.querySelectorAll('[data-difficulty]')];
        let selected = window.gameState?.difficulty?.level ?? 3;

        const render = () => {
          buttons.forEach((button) => {
            const active = Number(button.dataset.difficulty) === selected;
            button.classList.toggle('difficulty-button--active', active);
            button.setAttribute('aria-pressed', active ? 'true' : 'false');
          });
        };

        const setDifficulty = (level) => {
          selected = Math.min(5, Math.max(1, Number(level) || 3));
          window.dispatchEvent(new CustomEvent('visual:difficulty-requested', { detail: { level: selected } }));
          window.GameAPI?.setDifficulty?.(selected);
          render();
        };

        buttons.forEach((button) => {
          button.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            setDifficulty(button.dataset.difficulty);
          });
        });

        setDifficulty(selected);
      }

      function installTouchLock(root) {
        if (!root) return;

        const preventPageGesture = (event) => {
          if (event.cancelable) event.preventDefault();
        };

        const preventMultiTouch = (event) => {
          if (event.touches && event.touches.length > 1 && event.cancelable) {
            event.preventDefault();
          }
        };

        document.addEventListener('touchstart', preventMultiTouch, { passive: false });
        document.addEventListener('touchmove', preventPageGesture, { passive: false });
        document.addEventListener('gesturestart', preventPageGesture, { passive: false });
        document.addEventListener('gesturechange', preventPageGesture, { passive: false });
        root.addEventListener('contextmenu', preventPageGesture);
      }

      function blockOverlayTouch(overlay) {
        if (!overlay) return;
        const stop = (event) => {
          event.stopPropagation();
          if (event.type === 'touchmove' && event.cancelable) event.preventDefault();
        };
        ['pointerdown', 'pointermove', 'pointerup', 'touchstart', 'touchmove', 'touchend'].forEach((type) => {
          overlay.addEventListener(type, stop, { passive: false });
        });
      }
    </script>
  </body>
</html>
